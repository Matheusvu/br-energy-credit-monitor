name: refresh-data

# Keeps the warehouse current: re-runs the pipeline, runs tests, commits the
# updated marts + dashboard data, and publishes the dashboard to GitHub Pages.
# ONS publishes monthly, so a monthly schedule is plenty (plus manual dispatch).

on:
  schedule:
    - cron: "0 6 5 * *"   # 06:00 UTC on the 5th of each month
  workflow_dispatch:
    inputs:
      months:
        description: "Months back to ingest"
        default: "12"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync deps
        run: uv sync

      - name: Run tests
        run: uv run pytest -q

      - name: Refresh warehouse
        run: uv run python -m bpcm.cli refresh --months "${{ github.event.inputs.months || '12' }}"

      - name: Commit updated marts + dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/marts dashboard/data.js
          git diff --cached --quiet || git commit -m "chore: refresh warehouse [skip ci]"
          git push

      - name: Upload dashboard for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
